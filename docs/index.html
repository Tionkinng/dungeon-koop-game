<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, orientation=landscape">
		<title>Dungeon Koop Game</title>
		<style>
html, body, #canvas {
	margin: 0;
	padding: 0;
	border: 0;
}

html, body {
	width: 100%;
	height: 100%;
	overflow: hidden;
	background: #000;
	touch-action: none;
	color: white;
}

#canvas {
	display: block;
	width: 100vw !important;
	height: 100vh !important;
}

#canvas:focus { outline: none; }

#status, #status-splash, #status-progress {
	position: absolute;
	left: 0;
	right: 0;
}

#status, #status-splash { top: 0; bottom: 0; }

#status {
	background-color: #242424;
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	visibility: hidden;
}

#status-splash { max-height: 100%; max-width: 100%; margin: auto; }
#status-splash.show-image--false  { display: none; }
#status-splash.fullsize--true     { height: 100%; width: 100%; object-fit: contain; }
#status-splash.use-filter--false  { image-rendering: pixelated; }
#status-progress, #status-notice  { display: none; }
#status-progress { bottom: 10%; width: 50%; margin: 0 auto; }

#status-notice {
	background-color: #5b3943;
	border-radius: 0.5rem;
	border: 1px solid #9b3943;
	color: #e0e0e0;
	font-family: 'Noto Sans', 'Droid Sans', Arial, sans-serif;
	line-height: 1.3;
	margin: 0 2rem;
	overflow: hidden;
	padding: 1rem;
	text-align: center;
	z-index: 1;
}

#start-overlay {
	position: fixed;
	top: 0; left: 0;
	width: 100%; height: 100%;
	background: rgba(0, 0, 0, 0.88);
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	z-index: 9999;
	cursor: pointer;
}

#start-overlay h1 {
	color: white;
	font-family: monospace;
	font-size: 48px;
	letter-spacing: 4px;
	text-align: center;
	margin-bottom: 20px;
	image-rendering: pixelated;
}

#start-overlay p {
	color: #aaaaaa;
	font-family: monospace;
	font-size: 24px;
	text-align: center;
	animation: blink 1.2s infinite;
}

@keyframes blink {
	0%, 100% { opacity: 1; }
	50%       { opacity: 0; }
}

/* Querformat-Fallback: CSS-Rotation wenn die Screen Orientation API fehlt */
@media screen and (orientation: portrait) {
	html {
		transform: rotate(90deg);
		transform-origin: left top;
		width: 100vh;
		height: 100vw;
		position: absolute;
		top: 100%;
		left: 0;
	}
}
		</style>
		<link id="-gd-engine-icon" rel="icon" type="image/png" href="index.icon.png" />
		<link rel="apple-touch-icon" href="index.apple-touch-icon.png"/>
		<link rel="manifest" href="manifest.json">
	</head>
	<body>
		<div id="start-overlay">
			<h1>⚔ DUNGEON KOOP ⚔</h1>
			<p>Tippen zum Starten / Tap to Start</p>
		</div>

		<canvas id="canvas">
			Your browser does not support the canvas tag.
		</canvas>

		<noscript>Your browser does not support JavaScript.</noscript>

		<div id="status">
			<img id="status-splash" class="show-image--true fullsize--true use-filter--true" src="index.png" alt="">
			<progress id="status-progress"></progress>
			<div id="status-notice"></div>
		</div>

		<script src="index.js"></script>
		<script>
const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"emscriptenPoolSize":8,"ensureCrossOriginIsolationHeaders":true,"executable":"index","experimentalVK":false,"fileSizes":{"index.pck":11240020,"index.wasm":37700666},"focusCanvas":true,"gdextensionLibs":[],"godotPoolSize":4};
const GODOT_THREADS_ENABLED = false;
const engine = new Engine(GODOT_CONFIG);

(function () {
	const statusOverlay = document.getElementById('status');
	const statusProgress = document.getElementById('status-progress');
	const statusNotice   = document.getElementById('status-notice');
	let initializing = true;
	let statusMode   = '';

	function setStatusMode(mode) {
		if (statusMode === mode || !initializing) { return; }
		if (mode === 'hidden') { statusOverlay.remove(); initializing = false; return; }
		statusOverlay.style.visibility = 'visible';
		statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
		statusNotice.style.display   = mode === 'notice'   ? 'block' : 'none';
		statusMode = mode;
	}

	function setStatusNotice(text) {
		while (statusNotice.lastChild) { statusNotice.removeChild(statusNotice.lastChild); }
		text.split('\n').forEach(function (line) {
			statusNotice.appendChild(document.createTextNode(line));
			statusNotice.appendChild(document.createElement('br'));
		});
	}

	function displayFailureNotice(err) {
		console.error(err);
		setStatusNotice(err instanceof Error ? err.message : (typeof err === 'string' ? err : 'An unknown error occurred.'));
		setStatusMode('notice');
		initializing = false;
	}

	const missing = Engine.getMissingFeatures({ threads: GODOT_THREADS_ENABLED });

	if (missing.length !== 0) {
		if (GODOT_CONFIG['serviceWorker'] && GODOT_CONFIG['ensureCrossOriginIsolationHeaders'] && 'serviceWorker' in navigator) {
			let p;
			try { p = navigator.serviceWorker.getRegistration(); }
			catch (e) { p = Promise.reject(new Error('Service worker registration failed.')); }
			Promise.race([
				p.then(function (r) {
					if (r != null) { return Promise.reject(new Error('Service worker already exists.')); }
					return r;
				}).then(function () { return engine.installServiceWorker(); }),
				new Promise(function (resolve) { setTimeout(resolve, 2000); }),
			]).then(function () { window.location.reload(); })
			 .catch(function (e) { console.error('Error while registering service worker:', e); });
		} else {
			displayFailureNotice('Error\nThe following features required to run Godot projects on the Web are missing:\n' + missing.join('\n'));
		}
	} else {
		setStatusMode('progress');
		engine.startGame({
			'onProgress': function (current, total) {
				if (current > 0 && total > 0) { statusProgress.value = current; statusProgress.max = total; }
				else { statusProgress.removeAttribute('value'); statusProgress.removeAttribute('max'); }
			},
		}).then(function () { setStatusMode('hidden'); }, displayFailureNotice);
	}
}());
		</script>

		<!-- Audio entsperren: Browser Autoplay-Policy erfordert eine User-Geste.
		     touchstart + touchend + click abdecken damit auch schnelle Taps wirken. -->
		<script>
		window.addEventListener('load', function () {
			function audioEntsperren() {
				var AC = window.AudioContext || window.webkitAudioContext;
				if (AC) {
					var ctx    = new AC();
					var buffer = ctx.createBuffer(1, 1, 22050);
					var source = ctx.createBufferSource();
					source.buffer = buffer;
					source.connect(ctx.destination);
					source.start(0);
					ctx.resume();
				}
				if (window.Engine && typeof Engine.resumeAudioContext === 'function') {
					Engine.resumeAudioContext();
				}
				document.removeEventListener('touchstart', audioEntsperren);
				document.removeEventListener('touchend',   audioEntsperren);
				document.removeEventListener('click',      audioEntsperren);
			}
			document.addEventListener('touchstart', audioEntsperren, false);
			document.addEventListener('touchend',   audioEntsperren, false);
			document.addEventListener('click',      audioEntsperren, false);
		});
		</script>

		<!-- Querformat dauerhaft sperren + Vollbild beim ersten Touch -->
		<script>
		function querformatSperren() {
			if (screen.orientation && screen.orientation.lock) {
				screen.orientation.lock('landscape').catch(function (e) {
					console.log('Orientation lock nicht verfügbar – CSS Fallback aktiv', e);
				});
			}
		}
		window.addEventListener('orientationchange', querformatSperren);
		window.addEventListener('load', querformatSperren);

		document.addEventListener('touchstart', function () {
			querformatSperren();
			var el = document.documentElement;
			if (el.requestFullscreen)            { el.requestFullscreen(); }
			else if (el.webkitRequestFullscreen) { el.webkitRequestFullscreen(); }
		}, { once: true });

		document.getElementById('start-overlay')
			.addEventListener('click', function () { this.style.display = 'none'; }, { once: true });
		</script>
	</body>
</html>
