<!DOCTYPE html>
<html lang="de">
<head>

  <meta name="mobile-web-app-capable"                content="yes">
  <meta name="theme-color"                           content="#000000">
  <title>Dungeon Koop</title>
  <style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    position: fixed; inset: 0; width: 100%; height: 100%;
    overflow: hidden; background: #000; color: #fff;
    touch-action: none; -webkit-tap-highlight-color: transparent;
    user-select: none; -webkit-user-select: none;
  }
  #canvas {
    position: fixed !important; top: 0 !important; left: 0 !important;
    right: 0 !important; bottom: 0 !important;
    width: 100% !important; height: 100% !important;
    min-width: 100% !important; min-height: 100% !important;
    display: block !important; outline: none; border: 0;
    margin: 0 !important; padding: 0 !important;
  }
  #status {
    position: fixed; inset: 0; background: transparent;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    visibility: hidden; z-index: 100;
  }
  #status-splash { display: none !important; }
  #status-progress, #status-notice { display: none; }
  #status-progress { position: absolute; bottom: 10%; left: 25%; right: 25%; }
  #status-notice {
    position: absolute; bottom: 5%; left: 2rem; right: 2rem;
    background: #5b3943; border-radius: 0.5rem;
    border: 1px solid #9b3943; color: #e0e0e0;
    font-family: 'Noto Sans', 'Droid Sans', Arial, sans-serif;
    line-height: 1.3; overflow: hidden; padding: 1rem;
    text-align: center; z-index: 1;
  }
  @media screen and (orientation: portrait) {
    html {
      transform: rotate(90deg); transform-origin: left top;
      width: 100vh; height: 100vw;
      position: absolute; top: 100%; left: 0;
    }
  }
  </style>
  <link id="-gd-engine-icon" rel="icon" type="image/png" href="index.icon.png">
  <link rel="apple-touch-icon" href="index.apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <canvas id="canvas">Your browser does not support the canvas tag.</canvas>
  <noscript>JavaScript ist erforderlich.</noscript>
  <div id="status">
    <img id="status-splash" class="show-image--false" src="index.png" alt="">
    <progress id="status-progress"></progress>
    <div id="status-notice"></div>
  </div>
  <script src="index.js"></script>
  <script>
const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"emscriptenPoolSize":8,"ensureCrossOriginIsolationHeaders":true,"executable":"index","experimentalVK":false,"fileSizes":{"index.pck":11242084,"index.wasm":37700666},"focusCanvas":true,"gdextensionLibs":[],"godotPoolSize":4};
const GODOT_THREADS_ENABLED = false;
const engine = new Engine(GODOT_CONFIG);
(function(){
  var so=document.getElementById('status'),sp=document.getElementById('status-progress'),sn=document.getElementById('status-notice');
  var init=true,sm='';
  function setMode(m){if(sm===m||!init)return;if(m==='hidden'){so.remove();init=false;return;}so.style.visibility='visible';sp.style.display=(m==='progress')?'block':'none';sn.style.display=(m==='notice')?'block':'none';sm=m;}
  function setNotice(t){while(sn.lastChild)sn.removeChild(sn.lastChild);t.split('\n').forEach(function(l){sn.appendChild(document.createTextNode(l));sn.appendChild(document.createElement('br'));});}
  function fail(e){console.error(e);setNotice(e instanceof Error?e.message:(typeof e==='string'?e:'An unknown error occurred.'));setMode('notice');init=false;}
  var missing=Engine.getMissingFeatures({threads:GODOT_THREADS_ENABLED});
  if(missing.length!==0){
    if(GODOT_CONFIG['serviceWorker']&&GODOT_CONFIG['ensureCrossOriginIsolationHeaders']&&'serviceWorker' in navigator){
      var p;try{p=navigator.serviceWorker.getRegistration();}catch(e){p=Promise.reject(new Error('SW failed.'));}
      Promise.race([p.then(function(r){if(r!=null)return Promise.reject(new Error('SW exists.'));return r;}).then(function(){return engine.installServiceWorker();}),new Promise(function(res){setTimeout(res,2000);})])
        .then(function(){window.location.reload();}).catch(function(e){console.error(e);});
    }else{fail('Error\nFeatures missing:\n'+missing.join('\n'));}
  }else{
    setMode('progress');
    engine.startGame({'onProgress':function(c,t){if(c>0&&t>0){sp.value=c;sp.max=t;}else{sp.removeAttribute('value');sp.removeAttribute('max');}}})
      .then(function(){setMode('hidden');},fail);
  }
}());
  </script>
  <script>
  function canvasAufVollbild(){
    var c=document.getElementById('canvas');if(!c)return;
    var vb=document.fullscreenElement||document.webkitFullscreenElement;
    var w=vb?screen.width:window.innerWidth,h=vb?screen.height:window.innerHeight;
    c.style.cssText='position:fixed!important;top:0!important;left:0!important;right:0!important;bottom:0!important;width:'+w+'px!important;height:'+h+'px!important;min-width:'+w+'px!important;min-height:'+h+'px!important;display:block!important;outline:none;border:0;margin:0!important;padding:0!important;';
    window.dispatchEvent(new Event('resize'));
  }
  window.addEventListener('load',canvasAufVollbild);
  window.addEventListener('resize',canvasAufVollbild);
  window.addEventListener('orientationchange',function(){setTimeout(canvasAufVollbild,150);});
  document.addEventListener('fullscreenchange',function(){setTimeout(canvasAufVollbild,100);});
  document.addEventListener('webkitfullscreenchange',function(){setTimeout(canvasAufVollbild,100);});
  window.addEventListener('load',function(){setTimeout(canvasAufVollbild,500);setTimeout(canvasAufVollbild,1000);setTimeout(canvasAufVollbild,2000);});
  </script>
  <script>
  window.addEventListener('load',function(){
    function audioEntsperren(){
      var AC=window.AudioContext||window.webkitAudioContext;
      if(AC){var ctx=new AC(),buf=ctx.createBuffer(1,1,22050),src=ctx.createBufferSource();src.buffer=buf;src.connect(ctx.destination);src.start(0);ctx.resume();}
      if(window.Engine&&typeof Engine.resumeAudioContext==='function')Engine.resumeAudioContext();
      document.removeEventListener('touchstart',audioEntsperren);
      document.removeEventListener('touchend',audioEntsperren);
      document.removeEventListener('click',audioEntsperren);
    }
    document.addEventListener('touchstart',audioEntsperren,{passive:true});
    document.addEventListener('touchend',audioEntsperren,{passive:true});
    document.addEventListener('click',audioEntsperren,false);
  });
  </script>
  <script>
  function querformatSperren(){if(screen.orientation&&screen.orientation.lock)screen.orientation.lock('landscape').catch(function(){});}
  window.addEventListener('load',querformatSperren);
  window.addEventListener('orientationchange',querformatSperren);
  document.addEventListener('touchstart',function vollbild(){
    querformatSperren();
    var el=document.documentElement,p=el.requestFullscreen?el.requestFullscreen():el.webkitRequestFullscreen?el.webkitRequestFullscreen():null;
    if(p&&p.then)p.then(function(){setTimeout(canvasAufVollbild,50);setTimeout(canvasAufVollbild,200);}).catch(function(){});
    document.removeEventListener('touchstart',vollbild);
  },{passive:true});
  </script>
</body>
</html>
