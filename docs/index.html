<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0,
                 user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable"          content="yes">
  <meta name="apple-mobile-web-app-title"            content="Dungeon Koop">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable"                content="yes">
  <meta name="theme-color"                           content="#000000">
  <title>Dungeon Koop</title>

  <style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    color: #fff;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }

  #canvas {
    position: fixed !important;
    top:    0 !important;
    left:   0 !important;
    right:  0 !important;
    bottom: 0 !important;
    width:  100% !important;
    height: 100% !important;
    min-width:  100% !important;
    min-height: 100% !important;
    display: block !important;
    outline: none;
    border: 0;
    margin: 0 !important;
    padding: 0 !important;
  }

  #status {
    position: fixed;
    inset: 0;
    background: #242424;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    visibility: hidden;
    z-index: 100;
  }
  #status-splash { max-height: 100%; max-width: 100%; margin: auto; }
  #status-splash.show-image--false  { display: none; }
  #status-splash.fullsize--true     { height: 100%; width: 100%; object-fit: contain; }
  #status-splash.use-filter--false  { image-rendering: pixelated; }
  #status-progress, #status-notice  { display: none; }
  #status-progress { position: absolute; bottom: 10%; left: 25%; right: 25%; }
  #status-notice {
    position: absolute; bottom: 5%; left: 2rem; right: 2rem;
    background: #5b3943; border-radius: 0.5rem;
    border: 1px solid #9b3943; color: #e0e0e0;
    font-family: 'Noto Sans', 'Droid Sans', Arial, sans-serif;
    line-height: 1.3; overflow: hidden; padding: 1rem;
    text-align: center; z-index: 1;
  }

  #start-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.9);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    cursor: pointer;
  }
  #start-overlay h1 {
    color: #fff;
    font-family: monospace;
    font-size: clamp(24px, 6vw, 48px);
    letter-spacing: 4px;
    text-align: center;
    margin-bottom: 1rem;
    text-shadow: 2px 2px #000;
  }
  #start-overlay p {
    color: #aaa;
    font-family: monospace;
    font-size: clamp(13px, 3vw, 24px);
    text-align: center;
    animation: blinken 1.2s step-end infinite;
  }
  @keyframes blinken {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0; }
  }

  @media screen and (orientation: portrait) {
    html {
      transform: rotate(90deg);
      transform-origin: left top;
      width: 100vh;
      height: 100vw;
      position: absolute;
      top: 100%;
      left: 0;
    }
  }
  </style>

  <link id="-gd-engine-icon" rel="icon" type="image/png" href="index.icon.png">
  <link rel="apple-touch-icon" href="index.apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">
</head>
<body>

  <div id="start-overlay">
    <h1>⚔ DUNGEON KOOP ⚔</h1>
    <p>Tippen zum Starten / Tap to Start</p>
  </div>

  <canvas id="canvas">Your browser does not support the canvas tag.</canvas>
  <noscript>JavaScript ist erforderlich.</noscript>

  <div id="status">
    <img id="status-splash" class="show-image--true fullsize--true use-filter--true" src="index.png" alt="">
    <progress id="status-progress"></progress>
    <div id="status-notice"></div>
  </div>

  <script src="index.js"></script>
  <script>
const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"emscriptenPoolSize":8,"ensureCrossOriginIsolationHeaders":true,"executable":"index","experimentalVK":false,"fileSizes":{"index.pck":11239892,"index.wasm":37700666},"focusCanvas":true,"gdextensionLibs":[],"godotPoolSize":4};
const GODOT_THREADS_ENABLED = false;
const engine = new Engine(GODOT_CONFIG);

(function () {
  var statusOverlay  = document.getElementById('status');
  var statusProgress = document.getElementById('status-progress');
  var statusNotice   = document.getElementById('status-notice');
  var initializing = true, statusMode = '';

  function setStatusMode(mode) {
    if (statusMode === mode || !initializing) return;
    if (mode === 'hidden') { statusOverlay.remove(); initializing = false; return; }
    statusOverlay.style.visibility = 'visible';
    statusProgress.style.display = (mode === 'progress') ? 'block' : 'none';
    statusNotice.style.display   = (mode === 'notice')   ? 'block' : 'none';
    statusMode = mode;
  }
  function setStatusNotice(text) {
    while (statusNotice.lastChild) statusNotice.removeChild(statusNotice.lastChild);
    text.split('\n').forEach(function(l) {
      statusNotice.appendChild(document.createTextNode(l));
      statusNotice.appendChild(document.createElement('br'));
    });
  }
  function displayFailureNotice(err) {
    console.error(err);
    setStatusNotice(err instanceof Error ? err.message : (typeof err === 'string' ? err : 'An unknown error occurred.'));
    setStatusMode('notice'); initializing = false;
  }

  var missing = Engine.getMissingFeatures({ threads: GODOT_THREADS_ENABLED });
  if (missing.length !== 0) {
    if (GODOT_CONFIG['serviceWorker'] && GODOT_CONFIG['ensureCrossOriginIsolationHeaders'] && 'serviceWorker' in navigator) {
      var swp;
      try { swp = navigator.serviceWorker.getRegistration(); }
      catch(e) { swp = Promise.reject(new Error('SW registration failed.')); }
      Promise.race([
        swp.then(function(r){ if(r!=null) return Promise.reject(new Error('SW exists.')); return r; })
           .then(function(){ return engine.installServiceWorker(); }),
        new Promise(function(res){ setTimeout(res,2000); }),
      ]).then(function(){ window.location.reload(); })
       .catch(function(e){ console.error(e); });
    } else {
      displayFailureNotice('Error\nFeatures missing:\n' + missing.join('\n'));
    }
  } else {
    setStatusMode('progress');
    engine.startGame({
      'onProgress': function(cur, tot) {
        if (cur > 0 && tot > 0) { statusProgress.value = cur; statusProgress.max = tot; }
        else { statusProgress.removeAttribute('value'); statusProgress.removeAttribute('max'); }
      },
    }).then(function(){ setStatusMode('hidden'); }, displayFailureNotice);
  }
}());
  </script>

  <script>
  // Canvas auf exakte Pixel-Dimensionen zwingen damit Godot keine Ränder lässt.
  // Wird bei load, resize, fullscreenchange und als Sicherheitsnetz aufgerufen.
  function canvasAufVollbild() {
    var c = document.getElementById('canvas');
    if (!c) return;
    var vb = (document.fullscreenElement || document.webkitFullscreenElement);
    var w  = vb ? screen.width  : window.innerWidth;
    var h  = vb ? screen.height : window.innerHeight;
    c.style.cssText =
      'position:fixed!important;top:0!important;left:0!important;' +
      'right:0!important;bottom:0!important;' +
      'width:'  + w + 'px!important;height:' + h + 'px!important;' +
      'min-width:' + w + 'px!important;min-height:' + h + 'px!important;' +
      'display:block!important;outline:none;border:0;' +
      'margin:0!important;padding:0!important;';
    window.dispatchEvent(new Event('resize'));
  }

  window.addEventListener('load',              canvasAufVollbild);
  window.addEventListener('resize',            canvasAufVollbild);
  window.addEventListener('orientationchange', function(){ setTimeout(canvasAufVollbild, 150); });
  document.addEventListener('fullscreenchange',       function(){ setTimeout(canvasAufVollbild, 100); });
  document.addEventListener('webkitfullscreenchange', function(){ setTimeout(canvasAufVollbild, 100); });
  window.addEventListener('load', function() {
    setTimeout(canvasAufVollbild, 500);
    setTimeout(canvasAufVollbild, 1000);
    setTimeout(canvasAufVollbild, 2000);
  });
  </script>

  <script>
  // Audio entsperren (Browser Autoplay-Policy)
  window.addEventListener('load', function () {
    function audioEntsperren() {
      var AC = window.AudioContext || window.webkitAudioContext;
      if (AC) {
        var ctx = new AC(), buf = ctx.createBuffer(1,1,22050), src = ctx.createBufferSource();
        src.buffer = buf; src.connect(ctx.destination); src.start(0); ctx.resume();
      }
      if (window.Engine && typeof Engine.resumeAudioContext === 'function') Engine.resumeAudioContext();
      document.removeEventListener('touchstart', audioEntsperren);
      document.removeEventListener('touchend',   audioEntsperren);
      document.removeEventListener('click',      audioEntsperren);
    }
    document.addEventListener('touchstart', audioEntsperren, { passive: true });
    document.addEventListener('touchend',   audioEntsperren, { passive: true });
    document.addEventListener('click',      audioEntsperren, false);
  });
  </script>

  <script>
  // Querformat sperren + Vollbild beim ersten Touch
  function querformatSperren() {
    if (screen.orientation && screen.orientation.lock) {
      screen.orientation.lock('landscape').catch(function(){});
    }
  }
  window.addEventListener('load',              querformatSperren);
  window.addEventListener('orientationchange', querformatSperren);

  document.addEventListener('touchstart', function vollbildAktivieren() {
    querformatSperren();
    var el = document.documentElement;
    var p = el.requestFullscreen       ? el.requestFullscreen()
          : el.webkitRequestFullscreen ? el.webkitRequestFullscreen()
          : null;
    if (p && p.then) p.then(function(){ setTimeout(canvasAufVollbild,50); setTimeout(canvasAufVollbild,200); }).catch(function(){});
    document.removeEventListener('touchstart', vollbildAktivieren);
  }, { passive: true });

  document.getElementById('start-overlay').addEventListener('click', function() {
    this.style.display = 'none';
    canvasAufVollbild();
  }, { once: true });
  </script>

</body>
</html>
